<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokFetch</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>TokFetch</h1>
            <p class="subtitle">Download video/audio dari TikTok, Instagram, Facebook, YouTube, Twitter & banyak lagi</p>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="input-group">
                    <input type="url" name="url" placeholder="Tempelin link TikTok/IG/FB/YouTube di sini..." required autofocus>
                </div>

                <div class="mode-select">
                    <label class="mode-option">
                        <input type="radio" name="mode" value="video" checked>
                        <span class="mode-label">
                            Video MP4
                        </span>
                        <span class="mode-desc">Kualitas terbaik</span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="mode" value="photo">
                        <span class="mode-label">
                            Foto
                        </span>
                        <span class="mode-desc">IG/TikTok carousel</span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="mode" value="audio">
                        <span class="mode-label">
                            Audio MP3
                        </span>
                        <span class="mode-desc">320kbps</span>
                    </label>
                </div>

                <button type="submit" class="btn-download">
                    Download
                </button>
            </form>

            <div class="info">
                <p>Cara pakai:</p>
                <ol>
                    <li>Copy link dari TikTok, Instagram, Facebook, YouTube, dll</li>
                    <li>Tempel link di atas</li>
                    <li>Pilih Video MP4 atau Audio MP3</li>
                    <li>Klik Download</li>
                </ol>
            </div>
        </div>
    </div>
</body>
</html>
