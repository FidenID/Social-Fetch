<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Siap!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card success">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#2a8a44" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
            </div>
            <h1>Download Siap!</h1>
            <p class="subtitle">File udah siap, tinggal klik tombol di bawah</p>

            <div class="file-info">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#555" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                </svg>
                <span>{{ filename }}</span>
            </div>

            <a href="{{ url_for('download', file_id=file_id, mode=mode) }}" class="btn-download">
                Simpan File
            </a>

            <a href="{{ url_for('index') }}" class="btn-back">Download Lagi</a>
        </div>
    </div>
</body>
</html>
